  <circle cx="302" cy="195" r="20" fill="#ffffff"/>
  <circle cx="213" cy="196" r="13" fill="#3a2020"/>
  <circle cx="305" cy="196" r="13" fill="#3a2020"/>
  <!-- Eye shine -->
  <circle cx="218" cy="190" r="5" fill="#ffffff" opacity="0.95"/>
  <circle cx="310" cy="190" r="5" fill="#ffffff" opacity="0.95"/>
  <circle cx="207" cy="200" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="299" cy="200" r="2.5" fill="#ffffff" opacity="0.6"/>

  <!-- NOSE -->
  <ellipse cx="256" cy="228" rx="18" ry="12" fill="#1a1a1a"/>
  <!-- Nose shine -->
  <ellipse cx="251" cy="224" rx="5" ry="3" fill="#3a3a3a" opacity="0.6"/>

  <!-- MOUTH (cute smile) -->
  <path d="M238 242 Q256 262 274 242" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Rosy cheeks -->
  <ellipse cx="185" cy="235" rx="22" ry="14" fill="#f4a7b9" opacity="0.45"/>
  <ellipse cx="327" cy="235" rx="22" ry="14" fill="#f4a7b9" opacity="0.45"/>

  <!-- PANDA holding a cherry blossom branch -->
  <path d="M364 308 Q390 280 400 255 Q410 235 395 220" stroke="#4a3040" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M395 220 Q415 205 420 190" stroke="#4a3040" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M395 220 Q408 225 415 218" stroke="#4a3040" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Flowers on branch -->
  <g transform="translate(420,188)" opacity="0.95">
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="url(#petal)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#ffd6e0"/>
    <circle cx="0" cy="0" r="2" fill="#e8859a"/>
  </g>
  <g transform="translate(415,216)" opacity="0.85">
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(30)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(102)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(174)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(246)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(318)"/>
