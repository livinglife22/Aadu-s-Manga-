  <ellipse cx="390" cy="478" rx="55" ry="16" fill="#4a7a5a" opacity="0.5" transform="rotate(10 390 478)"/>
  <ellipse cx="256" cy="483" rx="90" ry="20" fill="#6a9a7a" opacity="0.5"/>
  <ellipse cx="155" cy="486" rx="50" ry="14" fill="#a8d5b5" opacity="0.8" transform="rotate(-12 155 486)"/>
  <ellipse cx="350" cy="484" rx="52" ry="15" fill="#90c0a0" opacity="0.75" transform="rotate(8 350 484)"/>
  <ellipse cx="256" cy="488" rx="75" ry="16" fill="#b8e0c5" opacity="0.7"/>
  <ellipse cx="195" cy="490" rx="44" ry="13" fill="#a8d5b5" opacity="0.8" transform="rotate(-6 195 490)"/>
  <ellipse cx="316" cy="489" rx="46" ry="13" fill="#98c8a8" opacity="0.75" transform="rotate(5 316 489)"/>
  <ellipse cx="185" cy="493" rx="38" ry="11" fill="#c2e8cc" opacity="0.9" transform="rotate(-15 185 493)"/>
  <ellipse cx="300" cy="492" rx="40" ry="12" fill="#c8ecd4" opacity="0.88" transform="rotate(12 300 492)"/>
  <ellipse cx="242" cy="495" rx="55" ry="13" fill="#d6f0dd" opacity="0.92"/>
  <ellipse cx="165" cy="497" rx="30" ry="9" fill="#e0f5e8" opacity="0.85" transform="rotate(-18 165 497)"/>
  <ellipse cx="338" cy="496" rx="32" ry="9" fill="#d8f2e0" opacity="0.82" transform="rotate(16 338 496)"/>

  <!-- Petals landing on leaves -->
  <ellipse cx="215" cy="488" rx="5" ry="7" fill="#f9c6d0" opacity="0.85" transform="rotate(-10 215 488)"/>
  <ellipse cx="275" cy="486" rx="4" ry="6" fill="#fde8ee" opacity="0.8" transform="rotate(15 275 486)"/>
  <ellipse cx="308" cy="489" rx="4" ry="6" fill="#f4a7b9" opacity="0.75" transform="rotate(-5 308 489)"/>
  <ellipse cx="180" cy="492" rx="4" ry="6" fill="#f9c6d0" opacity="0.7" transform="rotate(20 180 492)"/>
</svg>
