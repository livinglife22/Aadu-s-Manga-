    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(92)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(164)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(236)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(308)"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffd6e0"/>
  </g>

  <!-- PANDA BODY (chubby round) -->
  <ellipse cx="256" cy="320" rx="130" ry="120" fill="url(#pandaBody)"/>

