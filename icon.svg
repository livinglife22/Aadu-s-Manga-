  <ellipse cx="342" cy="410" rx="55" ry="40" fill="#1a1a1a"/>
  <!-- Paw pads -->
  <ellipse cx="162" cy="428" rx="30" ry="18" fill="#2a2a2a"/>
  <ellipse cx="350" cy="428" rx="30" ry="18" fill="#2a2a2a"/>
  <circle cx="152" cy="420" r="7" fill="#3a3a3a"/>
  <circle cx="172" cy="418" r="7" fill="#3a3a3a"/>
  <circle cx="340" cy="418" r="7" fill="#3a3a3a"/>
  <circle cx="360" cy="420" r="7" fill="#3a3a3a"/>

  <!-- PANDA ARMS -->
  <ellipse cx="148" cy="320" rx="40" ry="28" fill="#1a1a1a" transform="rotate(-20 148 320)"/>
  <ellipse cx="364" cy="320" rx="40" ry="28" fill="#1a1a1a" transform="rotate(20 364 320)"/>

  <!-- PANDA HEAD (big and round) -->
  <circle cx="256" cy="195" r="115" fill="url(#pandaBody)"/>

  <!-- EARS -->
  <circle cx="168" cy="108" r="42" fill="#1a1a1a"/>
  <circle cx="168" cy="108" r="22" fill="#2d2d2d"/>
  <circle cx="344" cy="108" r="42" fill="#1a1a1a"/>
  <circle cx="344" cy="108" r="22" fill="#2d2d2d"/>

  <!-- EYE PATCHES (big cute) -->
