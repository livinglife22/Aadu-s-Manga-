<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="100%" stop-color="#e8f5ee"/>
    </radialGradient>
    <radialGradient id="petal" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fde8ee"/>
      <stop offset="100%" stop-color="#f4a7b9"/>
    </radialGradient>
    <radialGradient id="pandaBody" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Falling petals behind panda -->
  <ellipse cx="60" cy="80" rx="8" ry="12" fill="#f9c6d0" opacity="0.7" transform="rotate(-20 60 80)"/>
  <ellipse cx="140" cy="50" rx="7" ry="10" fill="#fde8ee" opacity="0.6" transform="rotate(15 140 50)"/>
  <ellipse cx="390" cy="70" rx="9" ry="13" fill="#f4a7b9" opacity="0.65" transform="rotate(-30 390 70)"/>
  <ellipse cx="450" cy="140" rx="7" ry="11" fill="#f9c6d0" opacity="0.55" transform="rotate(25 450 140)"/>
  <ellipse cx="50" cy="200" rx="6" ry="9" fill="#fde8ee" opacity="0.5" transform="rotate(-10 50 200)"/>
  <ellipse cx="470" cy="220" rx="8" ry="11" fill="#f4a7b9" opacity="0.6" transform="rotate(35 470 220)"/>
  <ellipse cx="80" cy="310" rx="7" ry="10" fill="#f9c6d0" opacity="0.55" transform="rotate(-25 80 310)"/>
  <ellipse cx="440" cy="300" rx="6" ry="9" fill="#fde8ee" opacity="0.5" transform="rotate(20 440 300)"/>
  <ellipse cx="420" cy="80" rx="6" ry="9" fill="#f4a7b9" opacity="0.45" transform="rotate(10 420 80)"/>
  <ellipse cx="300" cy="35" rx="7" ry="10" fill="#f9c6d0" opacity="0.5" transform="rotate(-15 300 35)"/>
  <ellipse cx="180" cy="40" rx="6" ry="8" fill="#fde8ee" opacity="0.45" transform="rotate(30 180 40)"/>

  <!-- Floating cherry blossom flowers -->
  <g transform="translate(80,120)" opacity="0.8">
    <ellipse cx="0" cy="-9" rx="5" ry="8" fill="url(#petal)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="8" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="8" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="8" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="8" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3" fill="#ffd6e0"/>
  </g>
  <g transform="translate(420,110)" opacity="0.75">
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3" fill="#ffd6e0"/>
  </g>
  <g transform="translate(460,300)" opacity="0.65">
