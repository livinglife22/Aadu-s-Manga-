    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffd6e0"/>
