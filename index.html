<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Manga Shelf</title>
  <meta name="theme-color" content="#e63946"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MangaShelf"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f1a;
      color: #f0e6d3;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    header {
      background: #13152a;
      border-bottom: 1px solid #2a2d45;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    header h1 { font-family: 'Bangers', cursive; font-size: 28px; letter-spacing: 3px; color: #e63946; }
    header small { display: block; color: #5a5d7a; font-size: 11px; margin-top: 2px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 8px; padding: 10px 16px; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; cursor: pointer; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
    .btn:active { opacity: 0.75; }
    .btn-red { background: #e63946; color: #fff; }
    .btn-dark { background: #1e2240; color: #f0e6d3; border: 1px solid #2a2d45; }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-green { background: #16a34a; color: #fff; }

    main { max-width: 900px; margin: 0 auto; padding: 20px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }

    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap .ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #5a5d7a; pointer-events: none; }
    #searchInput {
      width: 100%; background: #1e2240; border: 1px solid #2a2d45; border-radius: 10px;
      color: #f0e6d3; padding: 11px 14px 11px 38px; font-size: 15px;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    #searchInput:focus { border-color: #6366f1; }

    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab-btn {
      background: #1e2240; color: #f0e6d3; border: 1px solid #2a2d45;
      border-radius: 20px; padding: 7px 14px; font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active-all { background: #e63946; border-color: #e63946; }
    .tab-btn.active-ongoing { background: #2563eb; border-color: #2563eb; }
    .tab-btn.active-completed { background: #16a34a; border-color: #16a34a; }

    #genreFilter {
      background: #1e2240; border: 1px solid #2a2d45; border-radius: 8px;
      color: #f0e6d3; padding: 7px 10px; font-family: 'Inter', sans-serif;
      font-size: 12px; outline: none; cursor: pointer;
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }

    .card {
      background: #13152a; border: 1px solid #2a2d45; border-radius: 12px;
      overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
      transition: transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(0.97); }
    .card-cover { height: 175px; background: #0d0f1a; position: relative; overflow: hidden; }
    .card-cover img { width: 100%; height: 100%; object-fit: cover; }
    .card-cover .no-cover { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #2a2d45; }
    .status-badge { position: absolute; top: 7px; right: 7px; font-size: 9px; font-weight: 700; border-radius: 20px; padding: 3px 7px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-ongoing { background: #2563eb; color: #fff; }
    .badge-completed { background: #16a34a; color: #fff; }
    .card-body { padding: 11px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .card-title { font-family: 'Bangers', cursive; font-size: 16px; letter-spacing: 0.5px; color: #f0e6d3; line-height: 1.2; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; }
    .genre-tag { background: #1e2240; color: #a78bfa; font-size: 10px; border-radius: 20px; padding: 2px 7px; }
    .stars { color: #C9A84C; font-size: 11px; letter-spacing: 1px; }
    .card-review { color: #7a7d9a; font-size: 11px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .card-tag { color: #6366f1; font-size: 10px; }

    .empty { text-align: center; padding: 70px 0; color: #3a3d5a; }
    .empty-icon { font-size: 50px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* MODAL */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(5,5,15,0.88); z-index: 100; align-items: flex-end; justify-content: center; }
    .overlay.open { display: flex; }
    .modal {
      background: #13152a; border: 1px solid #2a2d45;
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 580px;
      max-height: 92vh; overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      position: relative;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-drag { width: 40px; height: 4px; background: #2a2d45; border-radius: 4px; margin: 0 auto 20px; }
    .modal h2 { font-family: 'Bangers', cursive; font-size: 24px; letter-spacing: 1px; color: #f0e6d3; margin-bottom: 20px; }
    .close-btn { position: absolute; top: 20px; right: 18px; background: none; border: none; color: #7a7d9a; font-size: 20px; cursor: pointer; }

    label.field-label { display: block; color: #7a7d9a; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width: 100%; background: #1e2240; border: 1px solid #2a2d45; border-radius: 8px;
      color: #f0e6d3; padding: 10px 12px; font-size: 14px;
      font-family: 'Inter', sans-serif; outline: none; margin-bottom: 14px;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #6366f1; }
    textarea { min-height: 80px; resize: vertical; }
    option { background: #1e2240; }

    .status-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .status-row button { flex: 1; font-size: 13px; }

    .star-input { display: flex; gap: 8px; margin-bottom: 14px; }
    .star-input span { font-size: 26px; cursor: pointer; color: #3a3a4a; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
    .star-input span.lit { color: #C9A84C; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 10px; }
    .tag-pill { background: #1e2240; color: #a78bfa; border-radius: 20px; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .tag-pill .rm { color: #e63946; cursor: pointer; font-weight: 700; font-size: 14px; }
    .tag-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .tag-input-row input { margin-bottom: 0; flex: 1; }
    .tag-input-row button { padding: 10px 14px; font-size: 13px; white-space: nowrap; }

    .img-preview-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .img-thumb { position: relative; }
    .img-thumb img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 2px solid #2a2d45; display: block; }
    .img-thumb .rm-img { position: absolute; top: -5px; right: -5px; background: #e63946; color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; font-weight: 700; border: none; }
    .img-add { width: 72px; height: 72px; border: 2px dashed #3a3d5a; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #5a5d7a; font-size: 20px; -webkit-tap-highlight-color: transparent; }
    .img-add .lbl { font-size: 9px; margin-top: 2px; }

    .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
    .modal-footer .btn { flex: 1; font-size: 15px; padding: 13px; }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 200; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
    .lightbox .lb-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

    @media (min-width: 600px) {
      .overlay { align-items: center; }
      .modal { border-radius: 16px; max-height: 88vh; }
      .modal-drag { display: none; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>MANGA SHELF</h1>
    <small id="totalCount">0 titles tracked</small>
  </div>
  <button class="btn btn-red" onclick="openModal()">+ Add</button>
</header>

<main>
  <div class="search-wrap">
    <span class="ico">🔍</span>
    <input id="searchInput" type="text" placeholder="Search title or #hashtag…" oninput="renderCards()"/>
  </div>

  <div class="controls">
    <div class="tabs">
      <button class="tab-btn active-all" data-tab="all" onclick="setTab('all')">All</button>
      <button class="tab-btn" data-tab="ongoing" onclick="setTab('ongoing')">📖 Ongoing</button>
      <button class="tab-btn" data-tab="completed" onclick="setTab('completed')">✅ Done</button>
    </div>
    <select id="genreFilter" onchange="renderCards()">
      <option value="All">All Genres</option>
      <option>Action</option><option>Romance</option><option>Fantasy</option>
      <option>Horror</option><option>Slice of Life</option><option>Sci-Fi</option>
      <option>Comedy</option><option>Mystery</option><option>Shounen</option>
      <option>Seinen</option><option>Josei</option><option>Shoujo</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">📭</div>
    <p id="emptyMsg">No manga yet. Tap + Add!</p>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add Manga</h2>

    <input type="hidden" id="editId"/>

    <label class="field-label">Title</label>
    <input type="text" id="fTitle" placeholder="Manga title"/>

    <label class="field-label">Genre</label>
    <select id="fGenre">
      <option>Action</option><option>Romance</option><option>Fantasy</option>
      <option>Horror</option><option>Slice of Life</option><option>Sci-Fi</option>
      <option>Comedy</option><option>Mystery</option><option>Shounen</option>
      <option>Seinen</option><option>Josei</option><option>Shoujo</option>
    </select>

    <label class="field-label">Status</label>
    <div class="status-row">
      <button class="btn btn-blue" id="btnOngoing" onclick="setStatus('ongoing')">📖 Ongoing</button>
      <button class="btn btn-dark" id="btnCompleted" onclick="setStatus('completed')">✅ Completed</button>
    </div>
    <input type="hidden" id="fStatus" value="ongoing"/>

    <label class="field-label">Chapters Read</label>
    <input type="number" id="fChapters" placeholder="e.g. 45"/>

    <label class="field-label">Date Added</label>
    <input type="date" id="fDate"/>

    <label class="field-label">Cover Photo</label>
    <div class="img-preview-row" id="coverPreview"></div>
    <div class="img-add" onclick="document.getElementById('coverInput').click()">
      <span>+</span><span class="lbl">Cover</span>
    </div>
    <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="handleCover(event)"/>

    <div style="height:14px"></div>
    <label class="field-label">Panel Photos (memory aid)</label>
    <div class="img-preview-row" id="panelPreview"></div>
    <div class="img-add" onclick="document.getElementById('panelInput').click()">
      <span>+</span><span class="lbl">Panel</span>
    </div>
    <input type="file" id="panelInput" accept="image/*" multiple style="display:none" onchange="handlePanels(event)"/>

    <div style="height:14px"></div>
    <label class="field-label">Your Rating</label>
    <div class="star-input" id="starInput">
      <span data-s="1" onclick="setRating(1)">★</span>
      <span data-s="2" onclick="setRating(2)">★</span>
      <span data-s="3" onclick="setRating(3)">★</span>
      <span data-s="4" onclick="setRating(4)">★</span>
      <span data-s="5" onclick="setRating(5)">★</span>
    </div>
    <input type="hidden" id="fRating" value="0"/>

    <label class="field-label">Review / Notes</label>
    <textarea id="fReview" placeholder="What did you think?"></textarea>

    <label class="field-label">Hashtags</label>
    <div class="tag-list" id="tagList"></div>
    <div class="tag-input-row">
      <input type="text" id="tagInput" placeholder="Type tag, press Enter" onkeydown="tagKeydown(event)"/>
      <button class="btn btn-dark" onclick="addTag()">Add</button>
    </div>

    <div class="modal-footer">
      <button class="btn btn-red" id="saveBtn" onclick="saveManga()">Add to List</button>
      <button class="btn btn-dark" id="deleteBtn" onclick="deleteManga()" style="display:none;flex:0;padding:13px 16px;">🗑</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  let manga = JSON.parse(localStorage.getItem('mangaShelf') || '[]');
  let currentTags = [], currentCover = null, currentPanels = [], currentRating = 0, activeTab = 'all';

  function save() { localStorage.setItem('mangaShelf', JSON.stringify(manga)); }

  function renderCards() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const isHash = q.startsWith('#');
    const term = q.replace(/^#/, '');
    const genre = document.getElementById('genreFilter').value;
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');

    const filtered = manga.filter(m => {
      if (activeTab !== 'all' && m.status !== activeTab) return false;
      if (genre !== 'All' && m.genre !== genre) return false;
      if (term) {
        if (isHash) return (m.hashtags || []).some(t => t.includes(term));
        return m.title.toLowerCase().includes(term) || (m.hashtags || []).some(t => t.includes(term));
      }
      return true;
    });

    document.getElementById('totalCount').textContent = `${manga.length} title${manga.length !== 1 ? 's' : ''} tracked`;
    updateTabCounts();

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      document.getElementById('emptyMsg').textContent = term ? `No results for "${q}"` : 'No manga here yet. Tap + Add!';
    } else {
      empty.style.display = 'none';
      grid.innerHTML = filtered.map(m => cardHTML(m)).join('');
    }
  }

  function updateTabCounts() {
    const on = manga.filter(m => m.status === 'ongoing').length;
    const done = manga.filter(m => m.status === 'completed').length;
    document.querySelector('[data-tab="all"]').textContent = `All (${manga.length})`;
    document.querySelector('[data-tab="ongoing"]').textContent = `📖 Ongoing (${on})`;
    document.querySelector('[data-tab="completed"]').textContent = `✅ Done (${done})`;
  }

  function starsHTML(r) {
    return [1,2,3,4,5].map(s => `<span style="color:${s<=r?'#C9A84C':'#3a3a4a'}">★</span>`).join('');
  }

  function cardHTML(m) {
    const cover = m.cover ? `<img src="${m.cover}" alt="${m.title}" loading="lazy"/>` : `<div class="no-cover">📖</div>`;
    const tags = (m.hashtags||[]).slice(0,3).map(t=>`<span class="card-tag">#${t}</span>`).join('');
    const more = m.hashtags && m.hashtags.length > 3 ? `<span style="color:#5a5d7a;font-size:10px">+${m.hashtags.length-3}</span>` : '';
    return `<div class="card" onclick="openModal(${m.id})">
      <div class="card-cover">${cover}<span class="status-badge badge-${m.status}">${m.status}</span></div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-meta"><span class="genre-tag">${m.genre}</span><span class="stars">${starsHTML(m.rating)}</span></div>
        ${m.review ? `<div class="card-review">${m.review}</div>` : ''}
        ${m.hashtags&&m.hashtags.length ? `<div class="card-tags">${tags}${more}</div>` : ''}
      </div>
    </div>`;
  }

  function setTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => { b.className = 'tab-btn'; if (b.dataset.tab === tab) b.classList.add(`active-${tab}`); });
    renderCards();
  }

  function openModal(id) {
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (id) {
      const m = manga.find(x => x.id === id);
      document.getElementById('modalTitle').textContent = 'Edit Manga';
      document.getElementById('saveBtn').textContent = 'Save Changes';
      document.getElementById('deleteBtn').style.display = 'inline-flex';
      document.getElementById('editId').value = id;
      document.getElementById('fTitle').value = m.title;
      document.getElementById('fGenre').value = m.genre;
      document.getElementById('fChapters').value = m.chapters || '';
      document.getElementById('fDate').value = m.date || '';
      document.getElementById('fReview').value = m.review || '';
      currentCover = m.cover || null;
      currentPanels = [...(m.panels || [])];
      currentTags = [...(m.hashtags || [])];
      currentRating = m.rating || 0;
      setStatus(m.status);
    } else {
      document.getElementById('modalTitle').textContent = 'Add Manga';
      document.getElementById('saveBtn').textContent = 'Add to List';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('editId').value = '';
      document.getElementById('fTitle').value = '';
      document.getElementById('fGenre').value = 'Action';
      document.getElementById('fChapters').value = '';
      document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('fReview').value = '';
      currentCover = null; currentPanels = []; currentTags = []; currentRating = 0;
      setStatus('ongoing');
    }
    renderStars(); renderTagList(); renderCoverPreview(); renderPanelPreview();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function setStatus(s) {
    document.getElementById('fStatus').value = s;
    document.getElementById('btnOngoing').className = 'btn ' + (s === 'ongoing' ? 'btn-blue' : 'btn-dark');
    document.getElementById('btnCompleted').className = 'btn ' + (s === 'completed' ? 'btn-green' : 'btn-dark');
  }

  function setRating(r) { currentRating = r; renderStars(); }
  function renderStars() {
    document.querySelectorAll('#starInput span').forEach(s => s.classList.toggle('lit', parseInt(s.dataset.s) <= currentRating));
  }

  function tagKeydown(e) { if (e.key === 'Enter') { e.preventDefault(); addTag(); } }
  function addTag() {
    const inp = document.getElementById('tagInput');
    const val = inp.value.trim().replace(/^#/, '').toLowerCase();
    if (val && !currentTags.includes(val)) { currentTags.push(val); renderTagList(); }
    inp.value = '';
  }
  function removeTag(t) { currentTags = currentTags.filter(x => x !== t); renderTagList(); }
  function renderTagList() {
    document.getElementById('tagList').innerHTML = currentTags.map(t =>
      `<span class="tag-pill">#${t}<span class="rm" onclick="removeTag('${t}')">×</span></span>`
    ).join('');
  }

  function handleCover(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => { currentCover = ev.target.result; renderCoverPreview(); };
    r.readAsDataURL(file); e.target.value = '';
  }
  function removeCover() { currentCover = null; renderCoverPreview(); }
  function renderCoverPreview() {
    document.getElementById('coverPreview').innerHTML = currentCover
      ? `<div class="img-thumb"><img src="${currentCover}" alt="cover"/><button class="rm-img" onclick="removeCover()">×</button></div>` : '';
  }

  function handlePanels(e) {
    Array.from(e.target.files).forEach(file => {
      const r = new FileReader();
      r.onload = ev => { currentPanels.push(ev.target.result); renderPanelPreview(); };
      r.readAsDataURL(file);
    }); e.target.value = '';
  }
  function removePanel(i) { currentPanels.splice(i, 1); renderPanelPreview(); }
  function renderPanelPreview() {
    document.getElementById('panelPreview').innerHTML = currentPanels.map((p, i) =>
      `<div class="img-thumb"><img src="${p}" alt="panel"/><button class="rm-img" onclick="removePanel(${i})">×</button></div>`
    ).join('');
  }

  function saveManga() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { alert('Please enter a title.'); return; }
    const id = parseInt(document.getElementById('editId').value) || null;
    const entry = {
      id: id || Date.now(), title,
      genre: document.getElementById('fGenre').value,
      status: document.getElementById('fStatus').value,
      chapters: document.getElementById('fChapters').value,
      date: document.getElementById('fDate').value,
      review: document.getElementById('fReview').value.trim(),
      cover: currentCover, panels: [...currentPanels],
      hashtags: [...currentTags], rating: currentRating,
    };
    manga = id ? manga.map(m => m.id === id ? entry : m) : [...manga, entry];
    save(); closeModal(); renderCards();
  }

  function deleteManga() {
    const id = parseInt(document.getElementById('editId').value);
    if (!confirm('Delete this manga?')) return;
    manga = manga.filter(m => m.id !== id);
    save(); closeModal(); renderCards();
  }

  function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

  renderCards();
</script>
</body>
</html>
