<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Aadu's Library</title>
  <meta name="theme-color" content="#f4a7b9"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Aadu's Library"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #f4a7b9; --pink-light: #fde8ee; --pink-mid: #f9c6d0;
      --green: #a8d5b5; --green-light: #d6f0dd; --green-mid: #c2e8cc;
      --cream: #fff8f9; --bg: #fdf5f7; --card-bg: #ffffff;
      --border: #f0dde4; --text: #4a3540; --muted: #b59aa4;
      --purple: #c9a7d4; --purple-light: #eedff5; --purple-mid: #ddc8ea;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; min-height: 100dvh; }

    /* LOADING */
    .loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #fde8ee 0%, #d6f0dd 100%); gap: 16px; }
    .loading-screen .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: #c06080; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--pink-mid); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #fde8ee 0%, #d6f0dd 100%); }
    .login-screen.visible { display: flex; }
    .login-box { background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 40px 28px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 8px 40px rgba(244,167,185,0.18); }
    .login-icon { font-size: 44px; margin-bottom: 10px; }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 28px; color: #c06080; margin-bottom: 4px; }
    .login-tagline { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-box input { width: 100%; background: var(--pink-light); border: 1.5px solid var(--pink-mid); border-radius: 12px; color: var(--text); padding: 12px 14px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }
    .login-box input:focus { border-color: var(--pink); }
    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; text-align: left; }
    .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--pink); cursor: pointer; }
    .remember-row label { color: var(--muted); font-size: 13px; cursor: pointer; }
    .login-btn { width: 100%; background: linear-gradient(135deg, var(--pink) 0%, #e8859a 100%); color: #fff; border: none; border-radius: 12px; padding: 13px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; transition: opacity 0.15s; box-shadow: 0 4px 14px rgba(244,167,185,0.4); margin-bottom: 10px; }
    .login-btn:hover { opacity: 0.88; }
    .signup-link { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .signup-link span { color: #c06080; cursor: pointer; font-weight: 600; }
    .login-error { color: #e06080; font-size: 13px; margin-top: 8px; display: none; }
    .login-mode-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--muted); margin-bottom: 20px; }

    /* APP */
    .app { display: none; }
    .app.visible { display: block; }

    /* HEADER */
    header { background: linear-gradient(135deg, #fff0f4 0%, #edf8f0 100%); border-bottom: 1.5px solid var(--border); padding: 14px 20px; padding-top: max(14px, env(safe-area-inset-top)); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(244,167,185,0.1); }
    .header-logo { font-family: 'Playfair Display', serif; font-size: 20px; color: #c06080; }
    .header-sub { color: var(--muted); font-size: 11px; display: block; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-badge { background: var(--pink-light); border: 1px solid var(--pink-mid); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: #c06080; font-weight: 500; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: 8px; color: #4a7a5a; padding: 5px 10px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }

    /* SECTION TABS */
    .section-tabs { display: flex; background: #fff; border-bottom: 1.5px solid var(--border); padding: 0 20px; }
    .section-tab { padding: 13px 22px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; color: var(--muted); transition: color 0.2s, border-color 0.2s; }
    .section-tab.active-manga { color: #c06080; border-bottom-color: #c06080; }
    .section-tab.active-danmei { color: #7a5a8a; border-bottom-color: var(--purple); }

    main { max-width: 900px; margin: 0 auto; padding: 20px 16px; padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 80px)); }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap .ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 14px; }
    .search-wrap input { width: 100%; background: #fff; border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); padding: 11px 14px 11px 38px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; box-shadow: 0 2px 8px rgba(244,167,185,0.08); }
    .search-wrap input:focus { border-color: var(--pink); }

    /* CONTROLS */
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab-btn { background: #fff; color: var(--muted); border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 14px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active-all { background: var(--pink); border-color: var(--pink); color: #fff; }
    .tab-btn.active-ongoing, .tab-btn.active-reading { background: var(--green); border-color: var(--green); color: #fff; }
    .tab-btn.active-completed { background: #a8c5d4; border-color: #a8c5d4; color: #fff; }
    .tab-btn.active-hiatus { background: #f0c987; border-color: #f0c987; color: #fff; }
    .tab-btn.active-dropped { background: #e8a4a4; border-color: #e8a4a4; color: #fff; }
    select { background: #fff; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); padding: 6px 10px; font-family: 'Inter', sans-serif; font-size: 12px; outline: none; cursor: pointer; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; }

    /* CARD */
    .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; box-shadow: 0 2px 12px rgba(244,167,185,0.08); -webkit-tap-highlight-color: transparent; }
    .card:active { transform: scale(0.97); }
    .card:hover { transform: translateY(-4px); border-color: var(--pink); box-shadow: 0 8px 24px rgba(244,167,185,0.2); }
    .card.danmei-card:hover { border-color: var(--purple); box-shadow: 0 8px 24px rgba(201,167,212,0.2); }
    .card-cover { height: 175px; background: var(--pink-light); position: relative; overflow: hidden; }
    .danmei-card .card-cover { background: var(--purple-light); }
    .card-cover img { width: 100%; height: 100%; object-fit: cover; }
    .card-cover .no-cover { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 38px; flex-direction: column; gap: 6px; }
    .card-cover .no-cover .lbl { font-size: 10px; color: var(--muted); }
    .status-badge { position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 600; border-radius: 20px; padding: 3px 8px; text-transform: capitalize; }
    .badge-ongoing, .badge-reading { background: var(--green); color: #fff; }
    .badge-completed { background: #a8c5d4; color: #fff; }
    .badge-dropped { background: #e8a4a4; color: #fff; }
    .badge-hiatus { background: #f0c987; color: #fff; }
    .card-body { padding: 11px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--text); line-height: 1.3; }
    .danmei-card .card-title { font-family: 'Noto Serif SC', serif; font-size: 13px; font-weight: 600; color: #5a3a6a; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; }
    .genre-tag { background: var(--pink-light); color: #c06080; font-size: 10px; border-radius: 20px; padding: 2px 8px; font-weight: 500; }
    .danmei-card .genre-tag { background: var(--purple-light); color: #7a5a8a; }
    .stars { color: #f0a050; font-size: 11px; }
    .card-sub { color: var(--muted); font-size: 11px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .card-tag { color: #c06080; font-size: 10px; }
    .danmei-card .card-tag { color: #9a6aaa; }
    .chapter-count { background: var(--purple-light); color: #7a5a8a; font-size: 10px; border-radius: 6px; padding: 2px 6px; display: inline-block; }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 0; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* FAB */
    .add-btn { position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); right: 20px; background: linear-gradient(135deg, var(--pink) 0%, #e8859a 100%); color: #fff; border: none; border-radius: 50%; width: 56px; height: 56px; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(244,167,185,0.5); display: flex; align-items: center; justify-content: center; z-index: 40; transition: transform 0.15s; -webkit-tap-highlight-color: transparent; }
    .add-btn:active { transform: scale(0.93); }
    .add-btn.danmei-mode { background: linear-gradient(135deg, var(--purple) 0%, #b08ac0 100%); box-shadow: 0 4px 20px rgba(201,167,212,0.5); }

    /* MODAL */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(74,53,64,0.5); z-index: 100; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .overlay.open { display: flex; }
    .modal { background: var(--cream); border: 1.5px solid var(--border); border-radius: 24px 24px 0 0; width: 100%; max-width: 580px; max-height: 92vh; overflow-y: auto; padding: 24px 20px; padding-bottom: max(32px, env(safe-area-inset-bottom)); position: relative; animation: slideUp 0.25s ease; box-shadow: 0 -8px 40px rgba(244,167,185,0.15); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-drag { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 18px; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: #c06080; margin-bottom: 18px; }
    .modal h2.danmei-h { color: #7a5a8a; }
    .close-btn { position: absolute; top: 20px; right: 18px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
    label.fl { display: block; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .modal input[type="text"], .modal input[type="number"], .modal input[type="date"], .modal input[type="url"], .modal select.ms, .modal textarea { width: 100%; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
    .modal input:focus, .modal select.ms:focus, .modal textarea:focus { border-color: var(--pink); }
    .modal textarea { min-height: 75px; resize: vertical; }
    .status-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .status-row button { flex: 1; min-width: 70px; font-size: 11px; padding: 8px 8px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; background: #fff; color: var(--muted); transition: all 0.15s; }
    .star-input { display: flex; gap: 8px; margin-bottom: 14px; }
    .star-input span { font-size: 26px; cursor: pointer; color: #e0d0d8; transition: color 0.15s; }
    .star-input span.lit { color: #f0a050; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 10px; }
    .tag-pill { background: var(--pink-light); color: #c06080; border-radius: 20px; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; border: 1px solid var(--pink-mid); }
    .tag-pill.dp { background: var(--purple-light); color: #7a5a8a; border-color: var(--purple-mid); }
    .tag-pill .rm { color: #e06080; cursor: pointer; font-weight: 700; }
    .tag-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .tag-input-row input { margin-bottom: 0; flex: 1; }
    .tag-add-btn { background: var(--green-light); color: #4a7a5a; border: 1.5px solid var(--green-mid); border-radius: 10px; padding: 10px 14px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap; }
    .img-preview-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .img-thumb { position: relative; }
    .img-thumb img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; border: 2px solid var(--border); display: block; }
    .rm-img { position: absolute; top: -5px; right: -5px; background: var(--pink); color: #fff; border-radius: 50%; width: 17px; height: 17px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; font-weight: 700; border: none; }
    .img-add { width: 70px; height: 70px; border: 2px dashed var(--pink-mid); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 20px; margin-bottom: 14px; background: var(--pink-light); }

    /* LINKS SECTION */
    .links-section { margin-bottom: 14px; }
    .link-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .link-item { display: flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; }
    .link-item a { color: #c06080; font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-decoration: none; }
    .danmei-mode-link .link-item a { color: #7a5a8a; }
    .link-rm { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
    .link-input-row { display: flex; gap: 8px; }
    .link-input-row input { margin-bottom: 0; flex: 1; }
    .link-add-btn { background: var(--pink-light); color: #c06080; border: 1.5px solid var(--pink-mid); border-radius: 10px; padding: 10px 14px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap; }

    /* CHAPTER SECTION */
    .chapter-section { margin-top: 8px; }
    .chapter-section h3 { color: #7a5a8a; font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .add-ch-btn { background: var(--purple-light); color: #7a5a8a; border: 1px solid var(--purple-mid); border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; }
    .chapter-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
    .chapter-item { background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; }
    .chapter-item span { color: var(--text); font-size: 12px; }
    .chapter-item .ch-date { color: var(--muted); font-size: 10px; display: block; }
    .private-badge { background: var(--purple-light); color: #7a5a8a; border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 600; white-space: nowrap; }

    /* CHAPTER EDITOR */
    .chapter-editor { display: none; position: fixed; inset: 0; background: var(--cream); z-index: 200; flex-direction: column; padding: 20px; padding-top: max(20px, env(safe-area-inset-top)); }
    .chapter-editor.open { display: flex; }
    .chapter-editor-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .chapter-editor-header button { background: var(--pink-light); border: 1px solid var(--pink-mid); border-radius: 8px; color: #c06080; padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }
    .chapter-editor-header input { flex: 1; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
    .chapter-editor textarea { flex: 1; background: #fff; border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); padding: 14px; font-size: 15px; font-family: 'Georgia', serif; line-height: 1.8; outline: none; resize: none; }
    .chapter-save-btn { background: linear-gradient(135deg, var(--purple) 0%, #b08ac0 100%); color: #fff; border: none; border-radius: 12px; padding: 13px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 12px; box-shadow: 0 4px 14px rgba(201,167,212,0.3); }

    /* MODAL FOOTER */
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
    .modal-footer button { flex: 1; padding: 13px; border: none; border-radius: 12px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
    .modal-footer button:hover { opacity: 0.88; }
    .btn-save-manga { background: linear-gradient(135deg, var(--pink) 0%, #e8859a 100%); color: #fff; box-shadow: 0 4px 14px rgba(244,167,185,0.3); }
    .btn-save-danmei { background: linear-gradient(135deg, var(--purple) 0%, #b08ac0 100%); color: #fff; box-shadow: 0 4px 14px rgba(201,167,212,0.3); }
    .btn-delete { background: var(--pink-light); color: #c06080; flex: 0 !important; padding: 13px 16px !important; border: 1.5px solid var(--pink-mid) !important; }

    /* SAVING INDICATOR */
    .saving { position: fixed; bottom: 90px; right: 20px; background: var(--green); color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 500; z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .saving.show { opacity: 1; }

    @media (min-width: 600px) {
      .overlay { align-items: center; }
      .modal { border-radius: 20px; max-height: 88vh; }
      .modal-drag { display: none; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="login-icon">🌸</div>
  <div class="logo">Aadu's Library</div>
  <div class="spinner"></div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🌸🐉</div>
    <div class="login-logo">Aadu's Library</div>
    <div class="login-tagline">Your private manga & danmei collection</div>
    <div class="login-mode-title" id="loginModeTitle">Welcome back!</div>
    <input type="email" id="loginEmail" placeholder="Email address"/>
    <input type="password" id="loginPass" placeholder="Password"/>
    <div class="remember-row" id="rememberRow">
      <input type="checkbox" id="rememberMe" checked/>
      <label for="rememberMe">Remember me on this device</label>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn" onclick="handleAuth()">Sign In</button>
    <div class="signup-link" id="authToggle">Don't have an account? <span onclick="toggleAuthMode()">Sign up</span></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="mainApp">
  <header>
    <div>
      <div class="header-logo">🌸 Aadu's Library</div>
      <small class="header-sub" id="totalCount">Loading…</small>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge">👤</span>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <div class="section-tabs">
    <div class="section-tab active-manga" id="tabManga" onclick="setSection('manga')">🌸 Manga</div>
    <div class="section-tab" id="tabDanmei" onclick="setSection('danmei')">🐉 Danmei</div>
  </div>

  <main>
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="searchInput" placeholder="Search title or #hashtag…" oninput="renderCards()"/>
    </div>

    <div id="mangaControls" class="controls">
      <div class="tabs">
        <button class="tab-btn active-all" data-tab="all" onclick="setTab('all','manga')">All</button>
        <button class="tab-btn" data-tab="ongoing" onclick="setTab('ongoing','manga')">📖 Ongoing</button>
        <button class="tab-btn" data-tab="completed" onclick="setTab('completed','manga')">✅ Done</button>
      </div>
      <select id="mangaGenre" onchange="renderCards()">
        <option value="All">All Genres</option>

<script>
  // ── SUPABASE SETUP ─────────────────────────────────
  const SUPABASE_URL = 'https://tlpkzwfbbkuhluddyivq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRscGt6d2ZiYmt1aGx1ZGR5aXZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTQ0NzksImV4cCI6MjA5ODA3MDQ3OX0.3E8ZDVxbNTWQVG8bF2hXLoYshxN2HIVN-8fDqdYWh5Y';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── STATE ──────────────────────────────────────────
  let mangaList = [], danmeiList = [];
  let currentSection = 'manga', currentTab = 'all';
  let currentTags = [], currentCover = null, currentPanels = [], currentRating = 0;
  let currentChapters = [], currentLinks = [], currentStatus = 'ongoing';
  let currentUser = null;
  let isSignUp = false;

  // ── AUTH ───────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    document.getElementById('loadingScreen').style.display = 'none';
    if (session) {
      currentUser = session.user;
      showApp();
    } else {
      document.getElementById('loginScreen').classList.add('visible');
    }
  }

  function toggleAuthMode() {
    isSignUp = !isSignUp;
    document.getElementById('loginModeTitle').textContent = isSignUp ? 'Create your account' : 'Welcome back!';
    document.getElementById('loginBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('authToggle').innerHTML = isSignUp
      ? 'Already have an account? <span onclick="toggleAuthMode()">Sign in</span>'
      : "Don't have an account? <span onclick=\"toggleAuthMode()\">Sign up</span>";
    document.getElementById('rememberRow').style.display = isSignUp ? 'none' : 'flex';
    document.getElementById('loginError').style.display = 'none';
  }

  async function handleAuth() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    if (!email || !pass) { errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; return; }

    document.getElementById('loginBtn').textContent = '…';
    const remember = document.getElementById('rememberMe').checked;

    let result;
    if (isSignUp) {
      result = await sb.auth.signUp({ email, password: pass });
    } else {
      result = await sb.auth.signInWithPassword({ email, password: pass });
    }

    if (result.error) {
      errEl.textContent = result.error.message;
      errEl.style.display = 'block';
      document.getElementById('loginBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      return;
    }

    if (isSignUp && !result.data.session) {
      errEl.style.color = '#4a7a5a';
      errEl.textContent = '✅ Check your email to confirm your account!';
      errEl.style.display = 'block';
      document.getElementById('loginBtn').textContent = 'Sign Up';
      return;
    }

    currentUser = result.data.user;
    document.getElementById('loginScreen').classList.remove('visible');
    showApp();
  }

  async function handleLogout() {
    await sb.auth.signOut();
    currentUser = null;
    mangaList = []; danmeiList = [];
    document.getElementById('mainApp').classList.remove('visible');
    document.getElementById('loginScreen').classList.add('visible');
    document.getElementById('loginBtn').textContent = 'Sign In';
    isSignUp = false;
  }

  async function showApp() {
    document.getElementById('mainApp').classList.add('visible');
    document.getElementById('userBadge').textContent = '👤 Aadeshma';
    await loadData();
    renderCards();
  }

  // ── DATA ───────────────────────────────────────────
  async function loadData() {
    const [{ data: mg }, { data: dm }] = await Promise.all([
      sb.from('manga').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
      sb.from('danmei').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false })
    ]);
    mangaList = mg || [];
    danmeiList = dm || [];
  }

  function showSaving() {
    const el = document.getElementById('savingIndicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── RENDER ─────────────────────────────────────────
  function renderCards() {
    const list = currentSection === 'manga' ? mangaList : danmeiList;
    const genreEl = document.getElementById(currentSection === 'manga' ? 'mangaGenre' : 'danmeiGenre');
    const genre = genreEl ? genreEl.value : 'All';
    const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
    const isHash = q.startsWith('#'); const term = q.replace(/^#/, '');
    const grid = document.getElementById('grid'); const empty = document.getElementById('empty');

    const filtered = list.filter(m => {
      if (currentTab !== 'all' && m.status !== currentTab) return false;
      if (genre !== 'All' && m.genre !== genre) return false;
      if (term) {
        if (isHash) return (m.hashtags || []).some(t => t.includes(term));
        return m.title.toLowerCase().includes(term) || (m.hashtags || []).some(t => t.includes(term));
      }
      return true;
    });

    document.getElementById('totalCount').textContent = `${mangaList.length} manga · ${danmeiList.length} danmei`;

    if (filtered.length === 0) {
      grid.innerHTML = ''; empty.style.display = 'block';
      document.getElementById('emptyIcon').textContent = currentSection === 'danmei' ? '🐉' : '🌸';
      document.getElementById('emptyMsg').textContent = term ? `No results for "${q}"` : 'Nothing here yet! Tap + to add';
    } else {
      empty.style.display = 'none';
      grid.innerHTML = filtered.map(m => cardHTML(m)).join('');
    }
  }

  function starsHTML(r) { return [1,2,3,4,5].map(s => `<span style="color:${s<=r?'#f0a050':'#e0d0d8'}">★</span>`).join(''); }

  function cardHTML(m) {
    const isDanmei = currentSection === 'danmei';
    const cover = m.cover ? `<img src="${m.cover}" alt="${m.title}" loading="lazy"/>` : `<div class="no-cover">${isDanmei?'🐉':'🌸'}<span class="lbl">${isDanmei?'Danmei':'Manga'}</span></div>`;
    const tags = (m.hashtags||[]).slice(0,2).map(t=>`<span class="card-tag">#${t}</span>`).join('');
    const progress = isDanmei && m.total_chapters ? `<div class="card-sub">Ch.${m.current_chapter||0}/${m.total_chapters}</div>` : '';
    const chCount = isDanmei && m.saved_chapters && m.saved_chapters.length ? `<span class="chapter-count">🔒 ${m.saved_chapters.length} saved</span>` : '';
    const author = isDanmei && m.author ? `<div class="card-sub" style="font-size:10px;color:#9a7aaa">${m.author}</div>` : '';
    const linkCount = m.links && m.links.length ? `<div class="card-sub">🔗 ${m.links.length} link${m.links.length>1?'s':''}</div>` : '';
    return `<div class="card${isDanmei?' danmei-card':''}" onclick="openModal('${m.id}')">
      <div class="card-cover">${cover}<span class="status-badge badge-${m.status}">${m.status}</span></div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        ${author}
        <div class="card-meta"><span class="genre-tag">${m.genre}</span><span class="stars">${starsHTML(m.rating||0)}</span></div>
        ${progress}${chCount}${linkCount}
        ${m.hashtags&&m.hashtags.length?`<div class="card-tags">${tags}</div>`:''}
      </div>
    </div>`;
  }

  // ── TABS / SECTION ─────────────────────────────────
  function setSection(s) {
    currentSection = s; currentTab = 'all';
    document.getElementById('tabManga').className = 'section-tab' + (s==='manga'?' active-manga':'');
    document.getElementById('tabDanmei').className = 'section-tab' + (s==='danmei'?' active-danmei':'');
    document.getElementById('mangaControls').style.display = s==='manga'?'flex':'none';
    document.getElementById('danmeiControls').style.display = s==='danmei'?'flex':'none';
    document.getElementById('addBtn').className = 'add-btn' + (s==='danmei'?' danmei-mode':'');
    resetTabs(); renderCards();
  }

  function resetTabs() { document.querySelectorAll('.tab-btn').forEach(b=>{b.className='tab-btn';if(b.dataset.tab==='all')b.classList.add('active-all');}); }

  function setTab(tab, section) {
    if (section !== currentSection) return;
    currentTab = tab;
    document.querySelectorAll(`#${section}Controls .tab-btn`).forEach(b=>{b.className='tab-btn';if(b.dataset.tab===tab)b.classList.add(`active-${tab}`);});
    renderCards();
  }

  // ── MODAL ──────────────────────────────────────────
  function openModal(id) {
    const isDanmei = currentSection === 'danmei';
    const list = isDanmei ? danmeiList : mangaList;
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('mangaFields').style.display = isDanmei ? 'none' : 'block';
    document.getElementById('danmeiFields').style.display = isDanmei ? 'block' : 'none';
    document.getElementById('chapterSection').style.display = isDanmei ? 'block' : 'none';
    document.getElementById('panelSection').style.display = isDanmei ? 'none' : 'block';
    document.getElementById('modalTitle').className = isDanmei ? 'danmei-h' : '';
    document.getElementById('saveBtn').className = isDanmei ? 'btn-save-danmei' : 'btn-save-manga';
    document.getElementById('editSection').value = currentSection;
    document.getElementById('linkInput').style.setProperty('--accent', isDanmei ? 'var(--purple)' : 'var(--pink)');

    if (id && id !== 'undefined') {
      const m = list.find(x => x.id === id);
      if (!m) return;
      document.getElementById('modalTitle').textContent = 'Edit';
      document.getElementById('saveBtn').textContent = 'Save Changes';
      document.getElementById('deleteBtn').style.display = 'inline-block';
      document.getElementById('editId').value = id;
      document.getElementById('fTitle').value = m.title;
      document.getElementById('fReview').value = m.review || '';
      currentCover = m.cover || null;
      currentTags = [...(m.hashtags || [])];
      currentRating = m.rating || 0;
      currentLinks = [...(m.links || [])];
      currentStatus = m.status;
      if (isDanmei) {
        document.getElementById('fAuthor').value = m.author || '';
        document.getElementById('fGenreDanmei').value = m.genre;
        document.getElementById('fTotalChapters').value = m.total_chapters || '';
        document.getElementById('fCurrentChapter').value = m.current_chapter || '';
        currentChapters = [...(m.saved_chapters || [])];
        setStatus(m.status, true); renderChapterList();
      } else {
        document.getElementById('fGenreManga').value = m.genre;
        document.getElementById('fChapters').value = m.chapters || '';
        currentPanels = [...(m.panels || [])];
        setStatus(m.status, false);
      }
    } else {
      document.getElementById('modalTitle').textContent = isDanmei ? 'Add Danmei' : 'Add Manga';
      document.getElementById('saveBtn').textContent = 'Add to Shelf';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('editId').value = '';
      document.getElementById('fTitle').value = '';
      document.getElementById('fReview').value = '';
      if (isDanmei) { document.getElementById('fAuthor').value=''; document.getElementById('fTotalChapters').value=''; document.getElementById('fCurrentChapter').value=''; }
      else { document.getElementById('fChapters').value=''; }
      currentCover=null; currentTags=[]; currentRating=0; currentChapters=[]; currentPanels=[]; currentLinks=[];
      currentStatus = isDanmei ? 'reading' : 'ongoing';
      setStatus(currentStatus, isDanmei);
    }
    renderStars(); renderTagList(); renderCoverPreview(); renderPanelPreview(); renderLinkList();
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }
  function overlayClick(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

  // ── STATUS ─────────────────────────────────────────
  function setStatus(s, isDanmei) {
    currentStatus = s;
    const p = isDanmei !== false && (isDanmei === true || document.getElementById('editSection').value === 'danmei') ? 'ds' : 'ms';
    document.querySelectorAll(`[id^="${p}-"]`).forEach(b=>{b.style.background='#fff';b.style.color='var(--muted)';b.style.borderColor='var(--border)';});
    const el = document.getElementById(`${p}-${s}`);
    if (el) { const c={ongoing:'#a8d5b5',reading:'#c9a7d4',completed:'#a8c5d4',hiatus:'#f0c987',dropped:'#e8a4a4'}; el.style.background=c[s]||'#f4a7b9'; el.style.color='#fff'; el.style.borderColor=el.style.background; }
  }

  // ── STARS ──────────────────────────────────────────
  function setRating(r) { currentRating=r; renderStars(); }
  function renderStars() { document.querySelectorAll('#starInput span').forEach(s=>s.classList.toggle('lit',parseInt(s.dataset.s)<=currentRating)); }

  // ── TAGS ───────────────────────────────────────────
  function addTag() {
    const inp=document.getElementById('tagInput');
    const val=inp.value.trim().replace(/^#/,'').toLowerCase();
    if(val&&!currentTags.includes(val)){currentTags.push(val);renderTagList();}
    inp.value='';
  }
  function removeTag(t) { currentTags=currentTags.filter(x=>x!==t); renderTagList(); }
  function renderTagList() {
    const isDanmei=document.getElementById('editSection').value==='danmei';
    document.getElementById('tagList').innerHTML=currentTags.map(t=>`<span class="tag-pill${isDanmei?' dp':''}">#${t}<span class="rm" onclick="removeTag('${t}')">×</span></span>`).join('');
  }

  // ── LINKS ──────────────────────────────────────────
  function addLink() {
    const inp=document.getElementById('linkInput');
    const val=inp.value.trim();
    if(val&&!currentLinks.includes(val)){currentLinks.push(val);renderLinkList();}
    inp.value='';
  }
  function removeLink(i) { currentLinks.splice(i,1); renderLinkList(); }
  function renderLinkList() {
    document.getElementById('linkList').innerHTML=currentLinks.map((l,i)=>`
      <div class="link-item">
        <a href="${l}" target="_blank" rel="noopener">${l}</a>
        <button class="link-rm" onclick="removeLink(${i})">×</button>
      </div>`).join('');
  }

  // ── IMAGES ─────────────────────────────────────────
  function compressImage(file, maxSize=400) {
    return new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement('canvas');
          let w=img.width,h=img.height;
          if(w>h){if(w>maxSize){h=h*maxSize/w;w=maxSize;}}else{if(h>maxSize){w=w*maxSize/h;h=maxSize;}}
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          res(canvas.toDataURL('image/jpeg',0.7));
        };
        img.src=ev.target.result;
      };
      r.readAsDataURL(file);
    });
  }

  async function handleCover(e) {
    const file=e.target.files[0];if(!file)return;
    currentCover=await compressImage(file,500);
    renderCoverPreview();e.target.value='';
  }
  function removeCover(){currentCover=null;renderCoverPreview();}
  function renderCoverPreview(){
    document.getElementById('coverPreview').innerHTML=currentCover?`<div class="img-thumb"><img src="${currentCover}"/><button class="rm-img" onclick="removeCover()">×</button></div>`:'';
  }

  async function handlePanels(e) {
    for(const file of Array.from(e.target.files)){
      const d=await compressImage(file,400);
      currentPanels.push(d);
    }
    renderPanelPreview();e.target.value='';
  }
  function removePanel(i){currentPanels.splice(i,1);renderPanelPreview();}
  function renderPanelPreview(){
    document.getElementById('panelPreview').innerHTML=currentPanels.map((p,i)=>`<div class="img-thumb"><img src="${p}"/><button class="rm-img" onclick="removePanel(${i})">×</button></div>`).join('');
  }

  // ── CHAPTER EDITOR ─────────────────────────────────
  let editingChapterIdx = -1;
  function openChapterEditor(idx) {
    editingChapterIdx = idx !== undefined ? idx : -1;
    document.getElementById('chapterTitle').value = idx !== undefined ? currentChapters[idx].title : '';
    document.getElementById('chapterContent').value = idx !== undefined ? currentChapters[idx].content : '';
    document.getElementById('chapterEditor').classList.add('open');
  }
  function closeChapterEditor() { document.getElementById('chapterEditor').classList.remove('open'); }
  function saveChapter() {
    const title=document.getElementById('chapterTitle').value.trim();
    const content=document.getElementById('chapterContent').value.trim();
    if(!title||!content){alert('Please add a title and content.');return;}
    const ch={id:Date.now(),title,content,date:new Date().toISOString().split('T')[0]};
    if(editingChapterIdx>=0){currentChapters[editingChapterIdx]=ch;}else{currentChapters.push(ch);}
    renderChapterList();closeChapterEditor();
  }
  function renderChapterList(){
    document.getElementById('chapterList').innerHTML=currentChapters.length
      ?currentChapters.map((c,i)=>`
        <div class="chapter-item" onclick="openChapterEditor(${i})">
          <div><span>${c.title}</span><span class="ch-date">${c.date}</span></div>
          <span class="private-badge">🔒 Private</span>
        </div>`).join('')
      :'<div style="color:var(--muted);font-size:12px;padding:8px 0">No chapters saved yet</div>';
  }

  // ── SAVE / DELETE ──────────────────────────────────
  async function saveEntry() {
    const title=document.getElementById('fTitle').value.trim();
    if(!title){alert('Please enter a title.');return;}
    const isDanmei=document.getElementById('editSection').value==='danmei';
    const id=document.getElementById('editId').value||null;
    document.getElementById('saveBtn').textContent='Saving…';

    const base={title,genre:isDanmei?document.getElementById('fGenreDanmei').value:document.getElementById('fGenreManga').value,status:currentStatus,cover:currentCover,rating:currentRating,review:document.getElementById('fReview').value.trim(),hashtags:currentTags,links:currentLinks,user_id:currentUser.id};

    let data,error;
    if(isDanmei){
      const entry={...base,author:document.getElementById('fAuthor').value,total_chapters:document.getElementById('fTotalChapters').value,current_chapter:document.getElementById('fCurrentChapter').value,saved_chapters:currentChapters};
      if(id){({data,error}=await sb.from('danmei').update(entry).eq('id',id).select().single());}
      else{({data,error}=await sb.from('danmei').insert(entry).select().single());}
      if(!error){if(id){danmeiList=danmeiList.map(m=>m.id===id?data:m);}else{danmeiList=[data,...danmeiList];}}
    } else {
      const entry={...base,chapters:document.getElementById('fChapters').value,panels:currentPanels};
      if(id){({data,error}=await sb.from('manga').update(entry).eq('id',id).select().single());}
      else{({data,error}=await sb.from('manga').insert(entry).select().single());}
      if(!error){if(id){mangaList=mangaList.map(m=>m.id===id?data:m);}else{mangaList=[data,...mangaList];}}
    }

    if(error){alert('Error saving: '+error.message);document.getElementById('saveBtn').textContent='Save Changes';return;}
    showSaving();closeModal();renderCards();
  }

  async function deleteEntry() {
    const id=document.getElementById('editId').value;
    const isDanmei=document.getElementById('editSection').value==='danmei';
    if(!confirm('Delete this?'))return;
    const table=isDanmei?'danmei':'manga';
    await sb.from(table).delete().eq('id',id);
    if(isDanmei){danmeiList=danmeiList.filter(m=>m.id!==id);}else{mangaList=mangaList.filter(m=>m.id!==id);}
    closeModal();renderCards();
  }

  // ── SERVICE WORKER ─────────────────────────────────
  if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}

  // ── INIT ───────────────────────────────────────────
  init();
</script>
</body>
</html>
